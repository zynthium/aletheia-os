version: 0.1
schema: AIOS_SYSTEM_GRAPH
updated: TBD

root:
  id: root
  title: "TBD Project Root"
  thesis: "TBD: one-sentence governing thesis."
  status: active
  weight: 1.0
  confidence: 0.2
  children:
    - objectives
    - theory_model
    - system_design
    - engineering_execution
    - evidence_validation
    - optimization_allocation
    - risk_safety

nodes:
  objectives:
    type: trunk
    parent: root
    status: active
    weight: 0.95
    confidence: 0.3
    thesis: "Defines what the system is trying to optimize and what must not be sacrificed."
    core_constraints:
      - "Objectives must be explicit enough to evaluate trade-offs."
      - "Changing objectives requires a decision record."
    dependencies: []
    evidence: []
    kill_criteria: []

  theory_model:
    type: trunk
    parent: root
    status: active
    weight: 0.9
    confidence: 0.2
    thesis: "The explanatory or generative model behind the project."
    core_constraints:
      - "A theory must produce testable implications or usable design constraints."
    dependencies:
      - objectives
    evidence: []
    kill_criteria:
      - "Cannot explain known critical failure cases."

  system_design:
    type: trunk
    parent: root
    status: active
    weight: 0.9
    confidence: 0.2
    thesis: "Architecture or design decomposition that turns theory and objectives into buildable components."
    core_constraints:
      - "Interfaces must preserve theoretical meaning and operational constraints."
    dependencies:
      - objectives
      - theory_model
    evidence: []
    kill_criteria:
      - "Boundary choices repeatedly create interface mismatch blockers."

  engineering_execution:
    type: trunk
    parent: root
    status: active
    weight: 0.85
    confidence: 0.3
    thesis: "Implementation, reproducibility, automation, tests, and deployment."
    core_constraints:
      - "Implementation must be traceable to requirements, claims, or contracts."
    dependencies:
      - system_design
    evidence: []
    kill_criteria: []

  evidence_validation:
    type: trunk
    parent: root
    status: active
    weight: 0.9
    confidence: 0.25
    thesis: "Evidence production, interpretation, falsification, and audit."
    core_constraints:
      - "Evidence must state claim tested, method, result, interpretation, and graph impact."
    dependencies:
      - theory_model
      - engineering_execution
    evidence: []
    kill_criteria: []

  optimization_allocation:
    type: trunk
    parent: root
    status: active
    weight: 0.8
    confidence: 0.2
    thesis: "Resource, market, portfolio, design, or performance trade-off management."
    core_constraints:
      - "Optimization target must not be confused with proxy metrics."
    dependencies:
      - objectives
      - evidence_validation
      - risk_safety
    evidence: []
    kill_criteria:
      - "Repeatedly optimizes proxy while degrading real objective."

  risk_safety:
    type: trunk
    parent: root
    status: active
    weight: 0.95
    confidence: 0.25
    thesis: "Protects against catastrophic failure, invalid assumptions, and hidden tail risks."
    core_constraints:
      - "Safety/risk constraints override local performance gains unless explicitly revised by decision record."
    dependencies:
      - objectives
    evidence: []
    kill_criteria: []

priority_formula:
  description: "Suggested scoring formula for branch prioritization. Customize per domain."
  formula: "priority = strategic_value * dependency_unblock_value * uncertainty_reduction_value * feasibility * evidence_quality / max(implementation_cost * drift_risk, 0.01)"
  fields:
    strategic_value: "Impact on project mission if this node is resolved."
    dependency_unblock_value: "How many critical downstream branches it unlocks."
    uncertainty_reduction_value: "Expected reduction in decision uncertainty."
    feasibility: "Current ability to make progress."
    evidence_quality: "Reliability of existing evidence."
    implementation_cost: "Time, complexity, capital, compute, or organizational cost."
    drift_risk: "Probability this work pulls the project away from root constraints."
